<!-- PAGE HEADER -->
<section class="hero" style="padding-top:40px; padding-bottom:20px;">
  <div class="chip chip-center">Get in touch</div>
  <h1 class="hero-title" style="font-size:38px;">Let's turn your ideas <span class="accent">into clicks</span></h1>
  <p class="hero-sub">Tell me about your channel and what you need — I'll follow up within a day.</p>
</section>

<!-- FORM -->
<section class="form-section">
  <form class="hire-form" id="hireForm" action="https://formspree.io/f/mjgqldyb" method="POST">
    <div class="form-row">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-row">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="name@channel.com" required>
    </div>
    <div class="form-row">
      <label for="youtube">YouTube channel</label>
      <input type="text" id="youtube" name="youtube" placeholder="Link to your channel">
    </div>
    <div class="form-row">
      <label for="service">Which service do you need?</label>
      <select id="service" name="service" required>
        <option value="" disabled selected>Select a service</option>
        <option>Thumbnail ideation only</option>
        <option>Thumbnail design only</option>
        <option>Ideation and design</option>
        <option>Full packaging (ideation, design, title, tracking)</option>
        <option>Something else</option>
      </select>
    </div>
    <div class="form-row">
      <label for="socials">Other socials (optional)</label>
      <input type="text" id="socials" name="socials" placeholder="Instagram, X, Discord, etc.">
    </div>
    <div class="form-row">
      <label for="message">Anything else I should know? (optional)</label>
      <textarea id="message" name="message" rows="4" placeholder="Timeline, budget, video style..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Send</button>
    <p class="form-status" id="formStatus"></p>
  </form>
</section>
